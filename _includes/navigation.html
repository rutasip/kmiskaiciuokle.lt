<header class="fixed-top border-bottom bg-white p-2">
    <nav class="d-flex justify-content-center">
        {% for item in site.data.navigation %}
        <a href="{{ item.link }}" class="btn {% if '/'==item.link %}theme-btn-light me-3{% else %}theme-btn{% endif %}" >{{ item.name }}</a>
        {% endfor %}
    </nav>
</header>
