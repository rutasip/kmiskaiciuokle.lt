---
layout: default
---
<div class="main-content">
  <div class="two-columns post bg-white shadow-sm rounded p-3 p-sm-4 pb-0 pb-sm-0">
    <h1>{{ page.title | capitalize }}</h1>
    <p class="post__subtext">{{ page.description }}</p>
    <img class="rounded mt-4" src="{{ page.image }}" alt="{{ page.title }}" title="{{ page.title }}" />

    {{ content }}
  </div>

  <div class="posts-list-small">
    <div class="posts-list-small__fixed">
      {% for post in site.posts %}
      <a href="{{ post.url }}" class="row mb-3 g-0">
        <img class="col-4 rounded" src="{{ post.image }}" alt="{{ post.title }}" title="{{ post.title }}" />
        <div class="col-8 d-flex flex-column justify-content-between px-3">
          <p class="fs-7 mb-2">
            {{ post.title | capitalize }}
          </p>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</div>
