<header class="border-bottom bg-white p-3">
    <nav id="top-navigation" class="d-flex justify-content-center">
        {% for item in site.data.navigation %}
        <a href="{{ item.link }}" class="{% if '/'==item.link %}btn theme-btn-light me-3{% else %}btn theme-btn{% endif %}" >{{ item.name }}</a>
        {% endfor %}
    </nav>
</header>
