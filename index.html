<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <title>KMI skaičiuoklė</title>

    <link href="./assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./assets/css/index.css" rel="stylesheet" />
  </head>

  <body>
    <header class="border-bottom p-2">
      <nav id="top-navigation" class="d-flex justify-content-end">
        <button
          onclick="window.location.href='/'"
          type="button"
          class="btn btn-light me-3"
        >
          Skaičiuoklė
        </button>
        <button
          onclick="window.location.href='blog.html'"
          type="button"
          class="btn btn-dark"
        >
          Tinklaraštis
        </button>
      </nav>
    </header>
    <main class="row px-5">
      <div class="col-6 bg-white mt-4">
        <div class="row">
          <div class="col-12">
            <form class="row">
              <div class="col-6 mb-2">
                <label for="weight" class="form-label"
                  >Svoris</label
                >
                <div class="input-group mb-3">
                  <input type="number"
                  class="form-control"
                  id="weight"
                  aria-describedby="kg">
                  <span class="input-group-text" id="kg">kg</span>
                </div>
              </div>
              
              <div class="col-6 mb-2">
                <label for="height" class="form-label"
                  >Ūgis</label
                >
                <div class="input-group mb-3">
                  <input type="number"
                  class="form-control"
                  id="height"
                  aria-describedby="cm">
                  <span class="input-group-text" id="cm">cm</span>
                </div>
              </div>
  
              <div class="col-6 mb-2">
                <label for="height" class="form-label"
                  >Lytis</label
                >
                <select class="form-select input-group mb-3" id="inputGroupSelect01">
                  <option selected>Pasirinkti...</option>
                  <option value="1">Moteris</option>
                  <option value="2">Vyras</option>
                  <option value="3">Kita</option>
                </select>
              </div>
  
              <div class="col-6 mb-2">
                <label for="age" class="form-label"
                  >Amžius</label
                >
                <div class="input-group mb-3">
                  <input type="number"
                  class="form-control"
                  id="age">
                </div>
              </div>
              <div>
                <button type="submit" class="btn btn-dark">Skaičiuoti</button>
              </div>
            </form>
          </div>
          <div class="col-12">
            <table class="table">
              <thead>
                <tr>
                  <th>KMI</th>
                  <th class="text-right">Kūno svoris</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>&lt; 18,5</td>
                  <td class="text-right">Per mažas</td>
                </tr>
                <tr>
                  <td>18,5 - 24,9</td>
                  <td class="text-right">Normalus</td>
                </tr>
                <tr>
                  <td>25 - 29,9</td>
                  <td class="text-right">Antsvoris</td>
                </tr>
                <tr>
                  <td>30 - 34,9</td>
                  <td class="text-right">Pirmo lygio nutukimas</td>
                </tr>
                <tr>
                  <td>35 - 39,9</td>
                  <td class="text-right">Antro lygio nutukimas</td>
                </tr>
                <tr>
                  <td>&gt; 40,0</td>
                  <td class="text-right">Trečio lygio nutukimas</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-3 bg-white mt-4"><p>test</p></div>
    </main>
  </body>
</html>
