---
layout: default
title: Tinklaraštis
---
<main class="align-items-center flex-column px-2">
  {% for post in site.posts %}
  <a href="{{ post.url }}" class="big-article-card bg-white border rounded mb-4">
    <img
      class="container-fluid rounded-top p-0"
      src="{{ post.image | prepend: site.baseurl }}"
      alt="{{ post.title }}"
      title="{{ post.title }}"
    />
    <div class="my-auto p-4">
      <p class="fs-5 fw-bold mb-2">
        {{ post.title }}
      </p>
      <p class="fs-6 text-secondary">{{ post.excerpt }}</p>
      <p class="fs-7 mb-0 text-secondary">{{ post.author }} • {{ post.date | date_to_string }}</p>
    </div>
  </a>
  {% endfor %}
</main>

<ul>
  {% for post in site.posts %}
    <li>
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      {{ post.excerpt }}
    </li>
  {% endfor %}
</ul>
